# Render Blueprint for the PickGen backend (Infrastructure-as-code).
# In Render: New → Blueprint → point at this repo. It reads this file.
# Frontend is deployed separately on Vercel (see DEPLOY.md).
services:
  - type: web
    name: pickgen-backend
    runtime: node
    plan: free
    rootDir: backend
    # --include=dev forces devDependencies (typescript, @types/*) even though
    # NODE_ENV=production would otherwise skip them — they're needed to compile.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # ── AI ──
      - key: AI_PROVIDER
        value: fal
      - key: FAL_KEY
        sync: false # set in dashboard (secret)
      # ── Database (Neon Postgres) ──
      - key: DATABASE_URL
        sync: false # paste Neon connection string in dashboard
      # ── Auth ──
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret
      # ── Frontend origin for CORS (your Vercel URL) ──
      - key: CLIENT_ORIGIN
        sync: false # e.g. https://pickgen.vercel.app
      # ── Payments ── mock until Cryptomus keys are set, then switch to cryptomus
      - key: PAYMENT_PROVIDER
        value: mock
      - key: PUBLIC_API_URL
        sync: false # this backend's public URL, e.g. https://pickgen-backend-sqru.onrender.com
      - key: CRYPTOMUS_MERCHANT
        sync: false
      - key: CRYPTOMUS_API_KEY
        sync: false
      # ── Limits ──
      - key: FREE_SIGNUP_CREDITS
        value: 0
      - key: FREE_DAILY_DRAFTS
        value: 1
      # Paid-only launch: no free drafts until this date, then 1/day kicks in.
      - key: FREE_TIER_START
        value: "2026-08-12"
      - key: RATE_LIMIT_PER_MIN
        value: 12
